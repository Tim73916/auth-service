name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      
      - name: Clone auth-proto
        run: |
          git clone https://github.com/Tim73916/auth-proto.git ../auth-proto
          go mod edit -replace github.com/Tim73916/auth-proto=../auth-proto
      
      - name: Download dependencies
        run: go mod download
      
      - name: Build server
        run: go build -o server ./cmd/sso
      
      - name: Start gRPC server
        run: |
          mkdir -p storage
          ./server --config=./config/local.yaml &
          sleep 5
      
      - name: Run tests
        run: go test -v ./tests/...
      
      - name: Build migrator
        run: go build -v ./cmd/migrator